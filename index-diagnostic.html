<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grant Intelligence - Diagnostic Mode</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow-x: hidden; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        input::placeholder { color: #666; }
        select option { background: #1a1a2e; color: #e8e8e8; }
        .debug-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-width: 300px;
            z-index: 9999;
            border: 2px solid #0f0;
        }
        .debug-panel h4 { color: #ff0; margin-bottom: 10px; }
        .debug-item { margin: 5px 0; padding: 5px; background: rgba(0, 255, 0, 0.1); }
        .debug-error { color: #f00; background: rgba(255, 0, 0, 0.1); }
        .debug-success { color: #0f0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Search = ({ size = 24, color = 'currentColor', style = {} }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
        );

        const Filter = ({ size = 24, color = 'currentColor' }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
            </svg>
        );

        const MapPin = ({ size = 24, color = 'currentColor', style = {} }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
        );

        const DollarSign = ({ size = 24, color = 'currentColor', style = {} }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <line x1="12" y1="1" x2="12" y2="23"></line>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
        );

        const TrendingUp = ({ size = 24, color = 'currentColor', style = {} }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
        );

        const Calendar = ({ size = 24, color = 'currentColor', style = {} }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );

        const ExternalLink = ({ size = 24, color = 'currentColor' }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
        );

        const Loader2 = ({ size = 24, color = 'currentColor', style = {} }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{...style, animation: 'spin 1s linear infinite'}}>
                <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
            </svg>
        );

        function GrantSearchAgent() {
            const [filters, setFilters] = useState({
                location: 'australia',
                minAmount: '',
                maxAmount: '',
                successRate: 'any'
            });
            const [results, setResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [error, setError] = useState(null);
            const [diagnostics, setDiagnostics] = useState({
                currentUrl: window.location.href,
                isNetlify: window.location.href.includes('netlify.app'),
                isGitHub: window.location.href.includes('github.io'),
                functionEndpoint: '/.netlify/functions/search-grants',
                testResults: []
            });

            useEffect(() => {
                // Run diagnostics on load
                runDiagnostics();
            }, []);

            const runDiagnostics = async () => {
                const tests = [];
                
                // Test 1: Check if we're on Netlify
                tests.push({
                    name: 'Platform Check',
                    passed: window.location.href.includes('netlify.app'),
                    message: window.location.href.includes('netlify.app') 
                        ? 'Running on Netlify ✓' 
                        : '⚠️ NOT on Netlify! You need to visit your Netlify URL, not GitHub Pages'
                });

                // Test 2: Try to ping the function
                try {
                    const response = await fetch('/.netlify/functions/search-grants', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ filters: { location: 'australia', minAmount: '', maxAmount: '', successRate: 'any' } })
                    });
                    
                    tests.push({
                        name: 'Function Endpoint',
                        passed: response.ok,
                        message: response.ok 
                            ? 'Function endpoint accessible ✓' 
                            : `Function returned ${response.status}: ${response.statusText}`
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        tests.push({
                            name: 'Function Error Details',
                            passed: false,
                            message: errorText
                        });
                    }
                } catch (e) {
                    tests.push({
                        name: 'Function Endpoint',
                        passed: false,
                        message: `Cannot reach function: ${e.message}`
                    });
                }

                setDiagnostics(prev => ({ ...prev, testResults: tests }));
            };

            const searchGrants = async () => {
                setIsSearching(true);
                setError(null);
                setResults([]);

                try {
                    console.log('🔍 Attempting to call function at:', '/.netlify/functions/search-grants');
                    
                    const response = await fetch("/.netlify/functions/search-grants", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({ filters })
                    });

                    console.log('📡 Response status:', response.status);
                    console.log('📡 Response headers:', [...response.headers.entries()]);

                    if (!response.ok) {
                        const errorText = await response.text();
                        console.error('❌ Error response:', errorText);
                        throw new Error(`Function error (${response.status}): ${errorText}`);
                    }

                    const data = await response.json();
                    console.log('✅ Data received:', data);
                    
                    const allText = data.content
                        ?.filter(item => item.type === "text")
                        .map(item => item.text)
                        .join("\n") || '';

                    console.log('📄 Extracted text:', allText);

                    let jsonMatch = allText.match(/\[[\s\S]*\]/);
                    if (jsonMatch) {
                        const grants = JSON.parse(jsonMatch[0]);
                        console.log('📊 Parsed grants:', grants);
                        
                        let filtered = grants;
                        
                        if (filters.minAmount) {
                            filtered = filtered.filter(g => {
                                const amount = parseAmount(g.amount);
                                return amount >= parseInt(filters.minAmount);
                            });
                        }
                        
                        if (filters.maxAmount) {
                            filtered = filtered.filter(g => {
                                const amount = parseAmount(g.amount);
                                return amount <= parseInt(filters.maxAmount);
                            });
                        }
                        
                        if (filters.successRate !== 'any') {
                            filtered = filtered.filter(g => {
                                if (g.successRate === 'Not available') return filters.successRate === 'unknown';
                                const rate = parseFloat(g.successRate);
                                if (filters.successRate === 'high') return rate >= 30;
                                if (filters.successRate === 'medium') return rate >= 15 && rate < 30;
                                if (filters.successRate === 'low') return rate < 15;
                                return true;
                            });
                        }
                        
                        setResults(filtered);
                    } else {
                        setError("Could not parse grant results. API response format unexpected.");
                        console.error('❌ No JSON match in response');
                    }
                } catch (err) {
                    const errorMsg = `❌ ERROR: ${err.message}\n\nCommon fixes:\n1. Make sure you're visiting the Netlify URL (not GitHub Pages)\n2. Ensure ANTHROPIC_API_KEY is set in Netlify environment variables\n3. Redeploy after adding the API key`;
                    setError(errorMsg);
                    console.error('❌ Search error:', err);
                } finally {
                    setIsSearching(false);
                }
            };

            const parseAmount = (amountStr) => {
                const numbers = amountStr.match(/\d+(?:,\d+)*/g);
                if (!numbers) return 0;
                return parseInt(numbers[0].replace(/,/g, ''));
            };

            return (
                <>
                    {/* Diagnostic Panel */}
                    <div className="debug-panel">
                        <h4>🔧 DIAGNOSTICS</h4>
                        <div className="debug-item">
                            <strong>Current URL:</strong><br/>
                            {diagnostics.currentUrl}
                        </div>
                        {diagnostics.testResults.map((test, i) => (
                            <div key={i} className={test.passed ? 'debug-item debug-success' : 'debug-item debug-error'}>
                                <strong>{test.name}:</strong><br/>
                                {test.message}
                            </div>
                        ))}
                        <button 
                            onClick={runDiagnostics}
                            style={{
                                marginTop: '10px',
                                padding: '5px 10px',
                                background: '#0f0',
                                border: 'none',
                                borderRadius: '4px',
                                cursor: 'pointer',
                                color: '#000',
                                fontWeight: 'bold'
                            }}
                        >
                            Re-run Tests
                        </button>
                    </div>

                    <div style={{
                        minHeight: '100vh',
                        background: 'linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%)',
                        fontFamily: "'Crimson Pro', 'Georgia', serif",
                        color: '#e8e8e8',
                        padding: '3rem 2rem'
                    }}>
                        <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
                            <div style={{
                                marginBottom: '3rem',
                                borderBottom: '3px solid #16213e',
                                paddingBottom: '2rem'
                            }}>
                                <h1 style={{
                                    fontSize: '3.5rem',
                                    fontWeight: '700',
                                    margin: '0 0 0.5rem 0',
                                    background: 'linear-gradient(135deg, #e94560 0%, #f39c12 100%)',
                                    WebkitBackgroundClip: 'text',
                                    WebkitTextFillColor: 'transparent',
                                    backgroundClip: 'text',
                                    letterSpacing: '-0.02em'
                                }}>
                                    Grant Intelligence
                                </h1>
                                <p style={{
                                    fontSize: '1.25rem',
                                    color: '#a8a8a8',
                                    margin: 0,
                                    fontFamily: "'Inter', sans-serif"
                                }}>
                                    AI-powered grant discovery - DIAGNOSTIC MODE
                                </p>
                            </div>

                            {/* Warning if on GitHub Pages */}
                            {diagnostics.isGitHub && (
                                <div style={{
                                    background: 'rgba(255, 69, 0, 0.2)',
                                    border: '2px solid #ff4500',
                                    borderRadius: '12px',
                                    padding: '1.5rem',
                                    marginBottom: '2rem',
                                    color: '#ff6b6b'
                                }}>
                                    <h3 style={{ marginBottom: '1rem' }}>⚠️ WRONG URL!</h3>
                                    <p>You're on GitHub Pages, which won't work. You need to visit your <strong>Netlify URL</strong> instead!</p>
                                    <p style={{ marginTop: '1rem' }}>Look for a URL like: <code>yoursite.netlify.app</code></p>
                                </div>
                            )}

                            <div style={{
                                background: 'rgba(22, 33, 62, 0.6)',
                                backdropFilter: 'blur(10px)',
                                borderRadius: '16px',
                                padding: '2rem',
                                marginBottom: '2rem',
                                border: '1px solid rgba(233, 69, 96, 0.2)'
                            }}>
                                <div style={{
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: '0.5rem',
                                    marginBottom: '1.5rem'
                                }}>
                                    <Filter size={20} color="#e94560" />
                                    <h2 style={{ fontSize: '1.5rem', margin: 0, fontWeight: '600' }}>Search Filters</h2>
                                </div>

                                <div style={{
                                    display: 'grid',
                                    gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))',
                                    gap: '1.5rem',
                                    fontFamily: "'Inter', sans-serif"
                                }}>
                                    <div>
                                        <label style={{
                                            display: 'block',
                                            marginBottom: '0.5rem',
                                            fontSize: '0.9rem',
                                            color: '#a8a8a8',
                                            fontWeight: '500'
                                        }}>
                                            <MapPin size={16} style={{ display: 'inline', marginRight: '0.5rem' }} />
                                            Location
                                        </label>
                                        <select
                                            value={filters.location}
                                            onChange={(e) => setFilters({ ...filters, location: e.target.value })}
                                            style={{
                                                width: '100%',
                                                padding: '0.75rem',
                                                background: '#1a1a2e',
                                                border: '1px solid #16213e',
                                                borderRadius: '8px',
                                                color: '#e8e8e8',
                                                fontSize: '1rem',
                                                cursor: 'pointer'
                                            }}
                                        >
                                            <option value="both">Australia & International</option>
                                            <option value="australia">Australia Only</option>
                                            <option value="international">International Only</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label style={{
                                            display: 'block',
                                            marginBottom: '0.5rem',
                                            fontSize: '0.9rem',
                                            color: '#a8a8a8',
                                            fontWeight: '500'
                                        }}>
                                            <DollarSign size={16} style={{ display: 'inline', marginRight: '0.5rem' }} />
                                            Min Amount (AUD)
                                        </label>
                                        <input
                                            type="number"
                                            value={filters.minAmount}
                                            onChange={(e) => setFilters({ ...filters, minAmount: e.target.value })}
                                            placeholder="e.g., 5000"
                                            style={{
                                                width: '100%',
                                                padding: '0.75rem',
                                                background: '#1a1a2e',
                                                border: '1px solid #16213e',
                                                borderRadius: '8px',
                                                color: '#e8e8e8',
                                                fontSize: '1rem'
                                            }}
                                        />
                                    </div>

                                    <div>
                                        <label style={{
                                            display: 'block',
                                            marginBottom: '0.5rem',
                                            fontSize: '0.9rem',
                                            color: '#a8a8a8',
                                            fontWeight: '500'
                                        }}>
                                            <DollarSign size={16} style={{ display: 'inline', marginRight: '0.5rem' }} />
                                            Max Amount (AUD)
                                        </label>
                                        <input
                                            type="number"
                                            value={filters.maxAmount}
                                            onChange={(e) => setFilters({ ...filters, maxAmount: e.target.value })}
                                            placeholder="e.g., 100000"
                                            style={{
                                                width: '100%',
                                                padding: '0.75rem',
                                                background: '#1a1a2e',
                                                border: '1px solid #16213e',
                                                borderRadius: '8px',
                                                color: '#e8e8e8',
                                                fontSize: '1rem'
                                            }}
                                        />
                                    </div>

                                    <div>
                                        <label style={{
                                            display: 'block',
                                            marginBottom: '0.5rem',
                                            fontSize: '0.9rem',
                                            color: '#a8a8a8',
                                            fontWeight: '500'
                                        }}>
                                            <TrendingUp size={16} style={{ display: 'inline', marginRight: '0.5rem' }} />
                                            Success Rate
                                        </label>
                                        <select
                                            value={filters.successRate}
                                            onChange={(e) => setFilters({ ...filters, successRate: e.target.value })}
                                            style={{
                                                width: '100%',
                                                padding: '0.75rem',
                                                background: '#1a1a2e',
                                                border: '1px solid #16213e',
                                                borderRadius: '8px',
                                                color: '#e8e8e8',
                                                fontSize: '1rem',
                                                cursor: 'pointer'
                                            }}
                                        >
                                            <option value="any">Any Success Rate</option>
                                            <option value="high">High (≥30%)</option>
                                            <option value="medium">Medium (15-30%)</option>
                                            <option value="low">&lt;15%</option>
                                            <option value="unknown">Unknown/Not Available</option>
                                        </select>
                                    </div>
                                </div>

                                <button
                                    onClick={searchGrants}
                                    disabled={isSearching}
                                    style={{
                                        marginTop: '1.5rem',
                                        width: '100%',
                                        padding: '1rem',
                                        background: isSearching 
                                            ? 'linear-gradient(135deg, #666 0%, #888 100%)'
                                            : 'linear-gradient(135deg, #e94560 0%, #f39c12 100%)',
                                        border: 'none',
                                        borderRadius: '8px',
                                        color: 'white',
                                        fontSize: '1.1rem',
                                        fontWeight: '600',
                                        cursor: isSearching ? 'not-allowed' : 'pointer',
                                        display: 'flex',
                                        alignItems: 'center',
                                        justifyContent: 'center',
                                        gap: '0.5rem',
                                        transition: 'transform 0.2s',
                                        fontFamily: "'Inter', sans-serif"
                                    }}
                                >
                                    {isSearching ? (
                                        <>
                                            <Loader2 size={20} />
                                            Searching Current Grants...
                                        </>
                                    ) : (
                                        <>
                                            <Search size={20} />
                                            Search Grants (Test Mode)
                                        </>
                                    )}
                                </button>
                            </div>

                            {error && (
                                <div style={{
                                    background: 'rgba(233, 69, 96, 0.2)',
                                    border: '1px solid #e94560',
                                    borderRadius: '12px',
                                    padding: '1rem',
                                    marginBottom: '2rem',
                                    color: '#ff6b6b',
                                    whiteSpace: 'pre-wrap',
                                    fontFamily: 'monospace'
                                }}>
                                    {error}
                                </div>
                            )}

                            {results.length > 0 && (
                                <div style={{
                                    background: 'rgba(0, 255, 0, 0.1)',
                                    border: '2px solid #0f0',
                                    borderRadius: '12px',
                                    padding: '1.5rem',
                                    marginBottom: '2rem'
                                }}>
                                    <h2 style={{ color: '#0f0', marginBottom: '1rem' }}>
                                        ✅ SUCCESS! Found {results.length} grants
                                    </h2>
                                    <p style={{ color: '#a8a8a8' }}>
                                        Everything is working! You can now remove the diagnostic mode and use the regular version.
                                    </p>
                                </div>
                            )}

                            {!isSearching && results.length === 0 && !error && (
                                <div style={{
                                    textAlign: 'center',
                                    padding: '4rem 2rem',
                                    color: '#a8a8a8'
                                }}>
                                    <Search size={64} style={{ margin: '0 auto 1rem', opacity: 0.3 }} />
                                    <p style={{ fontSize: '1.25rem', fontFamily: "'Inter', sans-serif" }}>
                                        Check the diagnostics panel (top right) then try searching
                                    </p>
                                </div>
                            )}
                        </div>
                    </div>
                </>
            );
        }

        ReactDOM.render(<GrantSearchAgent />, document.getElementById('root'));
    </script>
</body>
</html>
