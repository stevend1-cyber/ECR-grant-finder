<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grant Intelligence - AI-Powered Grant Search</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        input::placeholder {
            color: #666;
        }
        
        select option {
            background: #1a1a2e;
            color: #e8e8e8;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Lucide React icons as inline SVG components
        const Search = ({ size = 24, color = 'currentColor', style = {} }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
        );

        const Filter = ({ size = 24, color = 'currentColor' }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
            </svg>
        );

        const MapPin = ({ size = 24, color = 'currentColor', style = {} }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
        );

        const DollarSign = ({ size = 24, color = 'currentColor', style = {} }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <line x1="12" y1="1" x2="12" y2="23"></line>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
        );

        const TrendingUp = ({ size = 24, color = 'currentColor', style = {} }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
        );

        const Calendar = ({ size = 24, color = 'currentColor', style = {} }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );

        const ExternalLink = ({ size = 24, color = 'currentColor' }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
        );

        const Loader2 = ({ size = 24, color = 'currentColor', style = {} }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{...style, animation: 'spin 1s linear infinite'}}>
                <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
            </svg>
        );

        function GrantSearchAgent() {
            const [filters, setFilters] = useState({
                location: 'australia',
                minAmount: '',
                maxAmount: '',
                successRate: 'any'
            });
            const [results, setResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [error, setError] = useState(null);

            const searchGrants = async () => {
                setIsSearching(true);
                setError(null);
                setResults([]);

                try {
                    const currentYear = new Date().getFullYear();
                    const currentMonth = new Date().toLocaleString('default', { month: 'long' });
                    
                    let searchQuery = `Early Career Researcher grants Business Law ${currentYear} ${currentMonth} open applications`;
                    
                    if (filters.location === 'australia') {
                        searchQuery += ' Australia';
                    } else if (filters.location === 'international') {
                        searchQuery += ' international worldwide';
                    }
                    
                    if (filters.minAmount || filters.maxAmount) {
                        searchQuery += ' funding amount';
                    }

                    const response = await fetch("https://api.anthropic.com/v1/messages", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            model: "claude-sonnet-4-20250514",
                            max_tokens: 4000,
                            tools: [
                                {
                                    type: "web_search_20250305",
                                    name: "web_search"
                                }
                            ],
                            messages: [
                                {
                                    role: "user",
                                    content: `Search for current grant opportunities for Early Career Researchers in Business and Law. Find grants that are currently open (closing date has not passed, currently accepting applications in ${currentMonth} ${currentYear}).

Location focus: ${filters.location === 'australia' ? 'Australia' : filters.location === 'international' ? 'International (outside Australia)' : 'Both Australia and International'}

Search Query: ${searchQuery}

For each grant found, extract:
1. Grant name/title
2. Funding body/organization
3. Amount/funding range
4. Closing date (must be in the future)
5. Eligibility criteria (especially for Early Career Researchers)
6. Success rate if available
7. URL/link to apply
8. Geographic focus (Australia or international)

Return ONLY a JSON array with this structure (no markdown, no preamble):
[{
  "name": "Grant Name",
  "organization": "Funding Body",
  "amount": "Amount range or specific amount",
  "closingDate": "Date string",
  "eligibility": "Brief eligibility summary",
  "successRate": "Percentage or 'Not available'",
  "url": "Application URL",
  "location": "Australia or International or Specific country",
  "description": "Brief description"
}]

Focus on grants specifically for Business, Law, or related social sciences fields. Only include grants with future closing dates.`
                                }
                            ]
                        })
                    });

                    const data = await response.json();
                    
                    const allText = data.content
                        .filter(item => item.type === "text")
                        .map(item => item.text)
                        .join("\n");

                    let jsonMatch = allText.match(/\[[\s\S]*\]/);
                    if (jsonMatch) {
                        const grants = JSON.parse(jsonMatch[0]);
                        
                        let filtered = grants;
                        
                        if (filters.minAmount) {
                            filtered = filtered.filter(g => {
                                const amount = parseAmount(g.amount);
                                return amount >= parseInt(filters.minAmount);
                            });
                        }
                        
                        if (filters.maxAmount) {
                            filtered = filtered.filter(g => {
                                const amount = parseAmount(g.amount);
                                return amount <= parseInt(filters.maxAmount);
                            });
                        }
                        
                        if (filters.successRate !== 'any') {
                            filtered = filtered.filter(g => {
                                if (g.successRate === 'Not available') return filters.successRate === 'unknown';
                                const rate = parseFloat(g.successRate);
                                if (filters.successRate === 'high') return rate >= 30;
                                if (filters.successRate === 'medium') return rate >= 15 && rate < 30;
                                if (filters.successRate === 'low') return rate < 15;
                                return true;
                            });
                        }
                        
                        setResults(filtered);
                    } else {
                        setError("Could not parse grant results. Please try again.");
                    }
                } catch (err) {
                    setError(`Search error: ${err.message}`);
                    console.error(err);
                } finally {
                    setIsSearching(false);
                }
            };

            const parseAmount = (amountStr) => {
                const numbers = amountStr.match(/\d+(?:,\d+)*/g);
                if (!numbers) return 0;
                return parseInt(numbers[0].replace(/,/g, ''));
            };

            return (
                <div style={{
                    minHeight: '100vh',
                    background: 'linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%)',
                    fontFamily: "'Crimson Pro', 'Georgia', serif",
                    color: '#e8e8e8',
                    padding: '3rem 2rem'
                }}>
                    <div style={{
                        maxWidth: '1200px',
                        margin: '0 auto'
                    }}>
                        <div style={{
                            marginBottom: '3rem',
                            borderBottom: '3px solid #16213e',
                            paddingBottom: '2rem'
                        }}>
                            <h1 style={{
                                fontSize: '3.5rem',
                                fontWeight: '700',
                                margin: '0 0 0.5rem 0',
                                background: 'linear-gradient(135deg, #e94560 0%, #f39c12 100%)',
                                WebkitBackgroundClip: 'text',
                                WebkitTextFillColor: 'transparent',
                                backgroundClip: 'text',
                                letterSpacing: '-0.02em'
                            }}>
                                Grant Intelligence
                            </h1>
                            <p style={{
                                fontSize: '1.25rem',
                                color: '#a8a8a8',
                                margin: 0,
                                fontFamily: "'Inter', sans-serif"
                            }}>
                                AI-powered grant discovery for Early Career Researchers in Business & Law
                            </p>
                        </div>

                        <div style={{
                            background: 'rgba(22, 33, 62, 0.6)',
                            backdropFilter: 'blur(10px)',
                            borderRadius: '16px',
                            padding: '2rem',
                            marginBottom: '2rem',
                            border: '1px solid rgba(233, 69, 96, 0.2)'
                        }}>
                            <div style={{
                                display: 'flex',
                                alignItems: 'center',
                                gap: '0.5rem',
                                marginBottom: '1.5rem'
                            }}>
                                <Filter size={20} color="#e94560" />
                                <h2 style={{
                                    fontSize: '1.5rem',
                                    margin: 0,
                                    fontWeight: '600'
                                }}>Search Filters</h2>
                            </div>

                            <div style={{
                                display: 'grid',
                                gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))',
                                gap: '1.5rem',
                                fontFamily: "'Inter', sans-serif"
                            }}>
                                <div>
                                    <label style={{
                                        display: 'block',
                                        marginBottom: '0.5rem',
                                        fontSize: '0.9rem',
                                        color: '#a8a8a8',
                                        fontWeight: '500'
                                    }}>
                                        <MapPin size={16} style={{ display: 'inline', marginRight: '0.5rem' }} />
                                        Location
                                    </label>
                                    <select
                                        value={filters.location}
                                        onChange={(e) => setFilters({ ...filters, location: e.target.value })}
                                        style={{
                                            width: '100%',
                                            padding: '0.75rem',
                                            background: '#1a1a2e',
                                            border: '1px solid #16213e',
                                            borderRadius: '8px',
                                            color: '#e8e8e8',
                                            fontSize: '1rem',
                                            cursor: 'pointer'
                                        }}
                                    >
                                        <option value="both">Australia & International</option>
                                        <option value="australia">Australia Only</option>
                                        <option value="international">International Only</option>
                                    </select>
                                </div>

                                <div>
                                    <label style={{
                                        display: 'block',
                                        marginBottom: '0.5rem',
                                        fontSize: '0.9rem',
                                        color: '#a8a8a8',
                                        fontWeight: '500'
                                    }}>
                                        <DollarSign size={16} style={{ display: 'inline', marginRight: '0.5rem' }} />
                                        Min Amount (AUD)
                                    </label>
                                    <input
                                        type="number"
                                        value={filters.minAmount}
                                        onChange={(e) => setFilters({ ...filters, minAmount: e.target.value })}
                                        placeholder="e.g., 5000"
                                        style={{
                                            width: '100%',
                                            padding: '0.75rem',
                                            background: '#1a1a2e',
                                            border: '1px solid #16213e',
                                            borderRadius: '8px',
                                            color: '#e8e8e8',
                                            fontSize: '1rem'
                                        }}
                                    />
                                </div>

                                <div>
                                    <label style={{
                                        display: 'block',
                                        marginBottom: '0.5rem',
                                        fontSize: '0.9rem',
                                        color: '#a8a8a8',
                                        fontWeight: '500'
                                    }}>
                                        <DollarSign size={16} style={{ display: 'inline', marginRight: '0.5rem' }} />
                                        Max Amount (AUD)
                                    </label>
                                    <input
                                        type="number"
                                        value={filters.maxAmount}
                                        onChange={(e) => setFilters({ ...filters, maxAmount: e.target.value })}
                                        placeholder="e.g., 100000"
                                        style={{
                                            width: '100%',
                                            padding: '0.75rem',
                                            background: '#1a1a2e',
                                            border: '1px solid #16213e',
                                            borderRadius: '8px',
                                            color: '#e8e8e8',
                                            fontSize: '1rem'
                                        }}
                                    />
                                </div>

                                <div>
                                    <label style={{
                                        display: 'block',
                                        marginBottom: '0.5rem',
                                        fontSize: '0.9rem',
                                        color: '#a8a8a8',
                                        fontWeight: '500'
                                    }}>
                                        <TrendingUp size={16} style={{ display: 'inline', marginRight: '0.5rem' }} />
                                        Success Rate
                                    </label>
                                    <select
                                        value={filters.successRate}
                                        onChange={(e) => setFilters({ ...filters, successRate: e.target.value })}
                                        style={{
                                            width: '100%',
                                            padding: '0.75rem',
                                            background: '#1a1a2e',
                                            border: '1px solid #16213e',
                                            borderRadius: '8px',
                                            color: '#e8e8e8',
                                            fontSize: '1rem',
                                            cursor: 'pointer'
                                        }}
                                    >
                                        <option value="any">Any Success Rate</option>
                                        <option value="high">High (≥30%)</option>
                                        <option value="medium">Medium (15-30%)</option>
                                        <option value="low">Low (&lt;15%)</option>
                                        <option value="unknown">Unknown/Not Available</option>
                                    </select>
                                </div>
                            </div>

                            <button
                                onClick={searchGrants}
                                disabled={isSearching}
                                style={{
                                    marginTop: '1.5rem',
                                    width: '100%',
                                    padding: '1rem',
                                    background: isSearching 
                                        ? 'linear-gradient(135deg, #666 0%, #888 100%)'
                                        : 'linear-gradient(135deg, #e94560 0%, #f39c12 100%)',
                                    border: 'none',
                                    borderRadius: '8px',
                                    color: 'white',
                                    fontSize: '1.1rem',
                                    fontWeight: '600',
                                    cursor: isSearching ? 'not-allowed' : 'pointer',
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    gap: '0.5rem',
                                    transition: 'transform 0.2s',
                                    fontFamily: "'Inter', sans-serif"
                                }}
                            >
                                {isSearching ? (
                                    <>
                                        <Loader2 size={20} />
                                        Searching Current Grants...
                                    </>
                                ) : (
                                    <>
                                        <Search size={20} />
                                        Search Grants
                                    </>
                                )}
                            </button>
                        </div>

                        {error && (
                            <div style={{
                                background: 'rgba(233, 69, 96, 0.2)',
                                border: '1px solid #e94560',
                                borderRadius: '12px',
                                padding: '1rem',
                                marginBottom: '2rem',
                                color: '#ff6b6b'
                            }}>
                                {error}
                            </div>
                        )}

                        {results.length > 0 && (
                            <div>
                                <h2 style={{
                                    fontSize: '2rem',
                                    marginBottom: '1.5rem',
                                    fontWeight: '600'
                                }}>
                                    Found {results.length} Current Opportunities
                                </h2>

                                <div style={{
                                    display: 'grid',
                                    gap: '1.5rem'
                                }}>
                                    {results.map((grant, index) => (
                                        <div
                                            key={index}
                                            style={{
                                                background: 'rgba(22, 33, 62, 0.6)',
                                                backdropFilter: 'blur(10px)',
                                                borderRadius: '16px',
                                                padding: '2rem',
                                                border: '1px solid rgba(233, 69, 96, 0.2)',
                                                transition: 'all 0.3s'
                                            }}
                                        >
                                            <div style={{
                                                display: 'flex',
                                                justifyContent: 'space-between',
                                                alignItems: 'flex-start',
                                                marginBottom: '1rem',
                                                gap: '1rem',
                                                flexWrap: 'wrap'
                                            }}>
                                                <h3 style={{
                                                    fontSize: '1.75rem',
                                                    margin: 0,
                                                    fontWeight: '600',
                                                    color: '#e94560'
                                                }}>
                                                    {grant.name}
                                                </h3>
                                                <span style={{
                                                    background: grant.location === 'Australia' 
                                                        ? 'rgba(243, 156, 18, 0.2)' 
                                                        : 'rgba(52, 152, 219, 0.2)',
                                                    color: grant.location === 'Australia' ? '#f39c12' : '#3498db',
                                                    padding: '0.5rem 1rem',
                                                    borderRadius: '20px',
                                                    fontSize: '0.85rem',
                                                    fontWeight: '600',
                                                    whiteSpace: 'nowrap',
                                                    fontFamily: "'Inter', sans-serif"
                                                }}>
                                                    {grant.location}
                                                </span>
                                            </div>

                                            <p style={{
                                                fontSize: '1.1rem',
                                                color: '#a8a8a8',
                                                margin: '0 0 1rem 0',
                                                fontWeight: '500'
                                            }}>
                                                {grant.organization}
                                            </p>

                                            <p style={{
                                                fontSize: '1rem',
                                                lineHeight: '1.6',
                                                color: '#c8c8c8',
                                                marginBottom: '1.5rem',
                                                fontFamily: "'Inter', sans-serif"
                                            }}>
                                                {grant.description}
                                            </p>

                                            <div style={{
                                                display: 'grid',
                                                gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))',
                                                gap: '1rem',
                                                marginBottom: '1.5rem',
                                                fontFamily: "'Inter', sans-serif"
                                            }}>
                                                <div>
                                                    <div style={{
                                                        display: 'flex',
                                                        alignItems: 'center',
                                                        gap: '0.5rem',
                                                        color: '#a8a8a8',
                                                        fontSize: '0.85rem',
                                                        marginBottom: '0.25rem'
                                                    }}>
                                                        <DollarSign size={16} />
                                                        Funding Amount
                                                    </div>
                                                    <div style={{
                                                        fontSize: '1.25rem',
                                                        fontWeight: '600',
                                                        color: '#e8e8e8'
                                                    }}>
                                                        {grant.amount}
                                                    </div>
                                                </div>

                                                <div>
                                                    <div style={{
                                                        display: 'flex',
                                                        alignItems: 'center',
                                                        gap: '0.5rem',
                                                        color: '#a8a8a8',
                                                        fontSize: '0.85rem',
                                                        marginBottom: '0.25rem'
                                                    }}>
                                                        <Calendar size={16} />
                                                        Closing Date
                                                    </div>
                                                    <div style={{
                                                        fontSize: '1.25rem',
                                                        fontWeight: '600',
                                                        color: '#e8e8e8'
                                                    }}>
                                                        {grant.closingDate}
                                                    </div>
                                                </div>

                                                <div>
                                                    <div style={{
                                                        display: 'flex',
                                                        alignItems: 'center',
                                                        gap: '0.5rem',
                                                        color: '#a8a8a8',
                                                        fontSize: '0.85rem',
                                                        marginBottom: '0.25rem'
                                                    }}>
                                                        <TrendingUp size={16} />
                                                        Success Rate
                                                    </div>
                                                    <div style={{
                                                        fontSize: '1.25rem',
                                                        fontWeight: '600',
                                                        color: '#e8e8e8'
                                                    }}>
                                                        {grant.successRate}
                                                    </div>
                                                </div>
                                            </div>

                                            <div style={{
                                                padding: '1rem',
                                                background: 'rgba(0, 0, 0, 0.3)',
                                                borderRadius: '8px',
                                                marginBottom: '1rem'
                                            }}>
                                                <div style={{
                                                    fontSize: '0.85rem',
                                                    color: '#a8a8a8',
                                                    marginBottom: '0.5rem',
                                                    fontFamily: "'Inter', sans-serif"
                                                }}>
                                                    Eligibility
                                                </div>
                                                <div style={{
                                                    fontSize: '1rem',
                                                    color: '#e8e8e8',
                                                    fontFamily: "'Inter', sans-serif"
                                                }}>
                                                    {grant.eligibility}
                                                </div>
                                            </div>

                                            {grant.url && (
                                                <a
                                                    href={grant.url}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    style={{
                                                        display: 'inline-flex',
                                                        alignItems: 'center',
                                                        gap: '0.5rem',
                                                        padding: '0.75rem 1.5rem',
                                                        background: 'linear-gradient(135deg, #e94560 0%, #f39c12 100%)',
                                                        color: 'white',
                                                        textDecoration: 'none',
                                                        borderRadius: '8px',
                                                        fontSize: '1rem',
                                                        fontWeight: '600',
                                                        fontFamily: "'Inter', sans-serif"
                                                    }}
                                                >
                                                    View Application Details
                                                    <ExternalLink size={16} />
                                                </a>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {!isSearching && results.length === 0 && !error && (
                            <div style={{
                                textAlign: 'center',
                                padding: '4rem 2rem',
                                color: '#a8a8a8'
                            }}>
                                <Search size={64} style={{ margin: '0 auto 1rem', opacity: 0.3 }} />
                                <p style={{
                                    fontSize: '1.25rem',
                                    fontFamily: "'Inter', sans-serif"
                                }}>
                                    Configure your filters and click "Search Grants" to find current opportunities
                                </p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<GrantSearchAgent />, document.getElementById('root'));
    </script>
</body>
</html>
